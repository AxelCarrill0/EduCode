<div class="layout-wrapper">
  <aside class="sidebar" [class.drawer-open]="mobileMenuOpen()" [attr.aria-hidden]="!mobileMenuOpen()">
    <div class="sidebar-glow"></div>

    <div class="sidebar-header" routerLink="/">
      <span class="sidebar-logo"><span class="logo-accent">Edu</span>Code</span>
      <span class="sidebar-tagline">Aprende a programar</span>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/platform/dashboard" routerLinkActive="nav-active" class="nav-item" (click)="closeMobileMenu()">
        <span class="nav-icon"><i class="pi pi-home"></i></span>
        <span>Dashboard</span>
      </a>
      <a routerLink="/platform/modules" routerLinkActive="nav-active" class="nav-item" (click)="closeMobileMenu()">
        <span class="nav-icon"><i class="pi pi-book"></i></span>
        <span>Módulos</span>
      </a>
      <a routerLink="/platform/laboratory" routerLinkActive="nav-active" class="nav-item" (click)="closeMobileMenu()">
        <span class="nav-icon"><i class="pi pi-code"></i></span>
        <span>Laboratorio</span>
      </a>
      <a routerLink="/platform/progress" routerLinkActive="nav-active" class="nav-item" (click)="closeMobileMenu()">
        <span class="nav-icon"><i class="pi pi-chart-bar"></i></span>
        <span>Progreso</span>
      </a>
      <a routerLink="/platform/settings" routerLinkActive="nav-active" class="nav-item" (click)="closeMobileMenu()">
        <span class="nav-icon"><i class="pi pi-cog"></i></span>
        <span>Ajustes</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-footer-content">
        <div class="sidebar-user-avatar">{{ userInitial }}</div>
        <div class="sidebar-user-info">
          <span class="sidebar-username">{{ userName }}</span>
          <p-tag [value]="userLevel.name" [severity]="userLevel.severity" styleClass="sidebar-level-tag"></p-tag>
        </div>
        <button class="sidebar-logout-btn" (click)="logout()" title="Cerrar sesión">
          <i class="pi pi-sign-out"></i>
        </button>
      </div>
    </div>
  </aside>

  <div class="mobile-overlay" [class.overlay-visible]="mobileMenuOpen()" (click)="closeMobileMenu()"
    [attr.aria-hidden]="!mobileMenuOpen()"></div>

  <div class="main-area">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" (click)="toggleMobileMenu()" aria-label="Abrir menú" aria-expanded="false"
          type="button">
          <i class="pi" [class.pi-bars]="!mobileMenuOpen()" [class.pi-times]="mobileMenuOpen()"></i>
        </button>
        <span class="topbar-title">Plataforma Educativa</span>
      </div>
      <div class="topbar-right">
        <div class="notif-btn-wrapper" (click)="toggleNotifPanel()" (keydown.escape)="closeNotifPanel()">
          <button class="notif-btn" [class.has-unread]="unreadCount > 0" aria-label="Notificaciones">
            <i class="pi pi-bell"></i>
            <span class="notif-badge" *ngIf="unreadCount > 0">{{ unreadCount > 9 ? '9+' : unreadCount }}</span>
          </button>

          <div class="notif-panel" *ngIf="notifOpen()" (click)="$event.stopPropagation()">
            <div class="notif-panel-header">
              <span class="notif-panel-title">Notificaciones</span>
              <button class="notif-mark-read-btn" *ngIf="unreadCount > 0" (click)="markAllRead()">
                Marcar todas leídas
              </button>
            </div>
            <div class="notif-panel-body">
              <div *ngIf="notifList.length === 0" class="notif-empty">
                <i class="pi pi-inbox"></i>
                <span>Sin notificaciones</span>
              </div>
              <div *ngFor="let n of notifList" class="notif-item" [class.unread]="!n.read"
                (click)="markAsRead(n.id)">
                <div class="notif-item-icon" [style.background]="n.color + '18'" [style.color]="n.color">
                  <i [class]="n.icon"></i>
                </div>
                <div class="notif-item-content">
                  <span class="notif-item-title">{{ n.title }}</span>
                  <span class="notif-item-msg">{{ n.message }}</span>
                </div>
                <div class="notif-item-dot" *ngIf="!n.read" [style.background]="n.color"></div>
              </div>
            </div>
          </div>
        </div>

        <a routerLink="/platform/settings" class="topbar-avatar-link">
          <p-avatar [label]="userInitial" shape="circle" size="large" styleClass="topbar-avatar"></p-avatar>
        </a>
      </div>
    </header>

    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
