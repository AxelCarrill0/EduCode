<div class="layout-wrapper">
  <aside class="sidebar">
    <div class="sidebar-header" routerLink="/">
      <span class="sidebar-logo"><span class="logo-accent">Edu</span>Code</span>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/platform/dashboard" routerLinkActive="nav-active" class="nav-item">
        <i class="pi pi-home"></i>
        <span>Dashboard</span>
      </a>
      <a routerLink="/platform/modules" routerLinkActive="nav-active" class="nav-item">
        <i class="pi pi-book"></i>
        <span>Módulos</span>
      </a>
      <a routerLink="/platform/laboratory" routerLinkActive="nav-active" class="nav-item">
        <i class="pi pi-code"></i>
        <span>Laboratorio</span>
      </a>
      <a routerLink="/platform/progress" routerLinkActive="nav-active" class="nav-item">
        <i class="pi pi-chart-bar"></i>
        <span>Progreso</span>
      </a>
      <a routerLink="/platform/settings" routerLinkActive="nav-active" class="nav-item">
        <i class="pi pi-cog"></i>
        <span>Ajustes</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user-info">
        <span class="sidebar-username">Usuario</span>
        <p-tag value="Nivel Básico" severity="success" styleClass="sidebar-level-tag"></p-tag>
      </div>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <div class="topbar-left">
        <i class="pi pi-circle-fill status-dot"></i>
        <span class="topbar-title">Plataforma Educativa</span>
      </div>
      <div class="topbar-right">
        <p-button
          label="Cerrar Sesión"
          icon="pi pi-sign-out"
          severity="success"
          [outlined]="true"
          styleClass="logout-btn"
          routerLink="/">
        </p-button>
        <p-avatar label="U" shape="circle" size="large" styleClass="topbar-avatar"></p-avatar>
      </div>
    </header>

    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
