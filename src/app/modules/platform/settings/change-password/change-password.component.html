<div class="subview-container">
  <a class="back-link" routerLink="/platform/settings">
    <i class="pi pi-arrow-left"></i>
    Volver a configuración
  </a>

  <div class="subview-card">
    <h1>Cambiar contraseña</h1>
    <p>Actualiza tu contraseña de acceso.</p>

    <div class="alert-error" *ngIf="error">
      <i class="pi pi-exclamation-circle"></i>
      {{ error }}
    </div>

    <div class="alert-success" *ngIf="success">
      <i class="pi pi-check-circle"></i>
      Contraseña actualizada correctamente.
    </div>

    <div class="form-group">
      <label for="curPass">Contraseña actual</label>
      <input id="curPass" type="password" class="form-input" [(ngModel)]="currentPassword">
    </div>

    <div class="form-group">
      <label for="newPass">Nueva contraseña</label>
      <input id="newPass" type="password" class="form-input" [(ngModel)]="newPassword">
    </div>

    <div class="form-group">
      <label for="confPass">Confirmar contraseña</label>
      <input id="confPass" type="password" class="form-input" [(ngModel)]="confirmPassword">
    </div>

    <div class="form-actions">
      <p-button label="Cambiar contraseña" icon="pi pi-lock" severity="success" (onClick)="change()"></p-button>
    </div>
  </div>
</div>
