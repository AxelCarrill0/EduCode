<div class="register-page">
  <div class="register-illustration-panel">
    <div class="illustration-content">
      <div class="brand-logo" routerLink="/">
        <span class="logo-accent">Edu</span>Code
      </div>
      <p class="brand-tagline">Comienza a aprender hoy</p>
    </div>
  </div>

  <div class="register-form-panel">
    <div class="mobile-logo-container">
      <div class="brand-logo" routerLink="/">
        <span class="logo-accent">Edu</span>Code
      </div>
    </div>

    <div class="form-card">
      <div class="form-card-accent"></div>
      <div class="form-card-body">
        <div class="form-header">
          <h2>Crear cuenta gratuita</h2>
          <p>Únete a miles de estudiantes que ya están aprendiendo</p>
        </div>

        <div class="error-alert" *ngIf="errorMessage">
          <i class="pi pi-exclamation-circle"></i>
          <span>{{ errorMessage }}</span>
        </div>

        <div class="social-login-row">
          <p-button styleClass="social-btn-labeled" severity="secondary" [outlined]="true" aria-label="Registrarse con Google">
            <i class="pi pi-google"></i>
            <span>Google</span>
          </p-button>
          <p-button styleClass="social-btn-labeled" severity="secondary" [outlined]="true" aria-label="Registrarse con GitHub">
            <i class="pi pi-github"></i>
            <span>GitHub</span>
          </p-button>
        </div>

        <p-divider align="center" type="solid">
          <span class="divider-text">O usa tu correo</span>
        </p-divider>

        <div class="form-group">
          <label for="fullname">Nombre completo</label>
          <input
            id="fullname"
            type="text"
            pInputText
            class="w-full"
            placeholder="Ej: Ana García"
            [(ngModel)]="nombre">
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input
            id="email"
            type="email"
            pInputText
            class="w-full"
            placeholder="ana@ejemplo.com"
            [(ngModel)]="correo">
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <p-password
            id="password"
            [feedback]="true"
            [toggleMask]="true"
            styleClass="w-full"
            inputStyleClass="w-full"
            [(ngModel)]="password"
            placeholder="Mínimo 8 caracteres">
          </p-password>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar contraseña</label>
          <p-password
            id="confirmPassword"
            [feedback]="false"
            [toggleMask]="true"
            styleClass="w-full"
            inputStyleClass="w-full"
            [(ngModel)]="confirmPassword"
            placeholder="Repite tu contraseña">
          </p-password>
        </div>

        <div class="form-options">
          <p-checkbox [(ngModel)]="acceptTerms" [binary]="true" inputId="accept-terms"></p-checkbox>
          <label for="accept-terms" class="terms-label">
            Acepto los <a class="terms-link" href="javascript:void(0)">Términos</a> y <a class="terms-link" href="javascript:void(0)">Política de Privacidad</a>
          </label>
        </div>

        <p-button
          label="Crear cuenta gratis"
          icon="pi pi-arrow-right"
          iconPos="right"
          styleClass="register-submit-btn"
          severity="success"
          (click)="registrar()">
        </p-button>

        <div class="login-section">
          <span>¿Ya tienes cuenta?</span>
          <a routerLink="/login">Inicia sesión</a>
        </div>
      </div>
    </div>

    <a routerLink="/" class="back-link">
      <i class="pi pi-arrow-left"></i> Volver al inicio
    </a>
  </div>
</div>
